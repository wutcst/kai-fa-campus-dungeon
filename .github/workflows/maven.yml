name: Maven CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Build executable jar
        run: mvn package

      - name: Upload game jar
        uses: actions/upload-artifact@v4
        with:
          name: campus-dungeon-jar
          path: target/campus-dungeon-1.0-SNAPSHOT.jar
          if-no-files-found: error
